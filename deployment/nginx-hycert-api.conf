# HySP Certificate API - Nginx Location Configuration
#
# 安裝方式：
#   sudo cp nginx-hycert-api.conf /etc/nginx/conf.d/service/hycert-api.conf
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# 存取路徑：https://your-domain/hycert-api/

# HySP Certificate API (Go + Gin, host port 8082 → container port 8082)
location /hycert-api/ {
    proxy_pass http://127.0.0.1:8082/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 60;
    proxy_send_timeout 60;
    proxy_read_timeout 60;
}
