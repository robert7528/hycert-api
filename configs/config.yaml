server:
  port: "8082"
  mode: "debug"

database:
  # DSN 由環境變數 DATABASE_DSN 覆蓋（共用 /etc/hysp/db.env）
  dsn: ""

log:
  level: "debug"
  filename: "logs/hycert-api.log"

jwt:
  expiry_hours: 24
  # secret: override via JWT_SECRET env (must match hyadmin-api)

tink:
  # keyset: override via TINK_KEYSET env (JSON keyset for private key encryption)

scheduler:
  enabled: true
  renewal_cron: "0 3 * * *"        # 每日 3:00 AM
  renewal_before_days: 30           # 到期前 N 天開始續約

acme:
  http_challenge_port: "80"         # HTTP-01 challenge 用
